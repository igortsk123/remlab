name: CI gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    # Postgres+pgvector сервис — готов для integration-тестов Stage 1 (пока не используется).
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: remlab
          POSTGRES_PASSWORD: test
          POSTGRES_DB: remlab
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U remlab" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://remlab:test@localhost:5432/remlab
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
