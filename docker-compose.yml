# remlab — изолированный стек на exit-fi. Сеть remlab-net внешняя (создана в S2).
# Логи и память ограничены на уровне контейнеров (демон Docker не трогаем — на хосте живёт VPN-нода).

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: remlab-caddy
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "443:443"       # TLS-ALPN-01 / HTTPS. :80 НЕ публикуем (занят системным nginx VPN).
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [remlab-net]
    mem_limit: 128m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  app:
    image: remlab-app:latest
    container_name: remlab-app
    restart: unless-stopped
    depends_on: [db]
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-dev}
      - DATABASE_URL=postgres://remlab:${POSTGRES_PASSWORD}@db:5432/remlab
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks: [remlab-net]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db:
    image: pgvector/pgvector:pg17
    container_name: remlab-db
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]
    environment:
      - POSTGRES_USER=remlab
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=remlab
    volumes:
      - remlab-db:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks: [remlab-net]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remlab -d remlab"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  remlab-net:
    external: true

volumes:
  remlab-db:
  caddy-data:
  caddy-config:
