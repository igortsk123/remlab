# remlab — изолированный стек на exit-fi. Сеть remlab-net внешняя (создана в S2).
# Логи и память ограничены на уровне контейнеров (демон Docker не трогаем — на хосте живёт VPN-нода).

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: remlab-caddy
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "443:443"       # TLS-ALPN-01 / HTTPS. :80 НЕ публикуем (занят системным nginx VPN).
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [remlab-net]
    mem_limit: 128m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Одноразовая инициализация тома трейсов: app работает под nextjs (uid 1001), а свежий named-том
  # принадлежит root → запись картинок-ассетов падала молча. Здесь под root выставляем владельца, затем
  # app стартует. Идемпотентно, переживает пересоздание тома. Изолировано (свой alpine, VPN не трогаем).
  traces-init:
    image: alpine:3.20
    container_name: remlab-traces-init
    command: ["sh", "-c", "mkdir -p /data && chown -R 1001:65533 /data && chmod -R u+rwX /data"]
    volumes:
      - remlab-traces:/data
    restart: "no"
    logging:
      driver: json-file
      options: { max-size: "1m", max-file: "1" }

  app:
    # По умолчанию — локальный образ (manual deploy.sh). GitHub-путь передаёт REMLAB_IMAGE=ghcr.io/...:sha
    # → сервер тянет ТОЛЬКО изменённые слои (инкрементально, легко), не собирает у себя.
    image: ${REMLAB_IMAGE:-remlab-app:latest}
    container_name: remlab-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      traces-init:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-dev}
      - DATABASE_URL=postgres://remlab:${POSTGRES_PASSWORD}@db:5432/remlab
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Трейсинг пайплайна (ADR-0013): картинки-ассеты на томе, сжатие через imagor.
      - TRACE_DIR=/app/data/traces
      - IMAGOR_BASE_URL=http://remlab-imagor:8000
      - TRACE_ADMIN_TOKEN=${TRACE_ADMIN_TOKEN:-}
      - TRACE_RETENTION_DAYS=${TRACE_RETENTION_DAYS:-90}
      # Базовый URL для абсолютных (подписанных) ссылок на ассеты в разборе /trace.
      - TRACE_PUBLIC_BASE_URL=${TRACE_PUBLIC_BASE_URL:-https://remont-lab.online}
    volumes:
      - remlab-traces:/app/data/traces
    networks: [remlab-net]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Сжатие/уменьшение картинок (Go+libvips), internal-only на remlab-net (в браузер не светится).
  # Читает временные оригиналы из тома трейсов (ro), отдаёт webp. Тот же паттерн, что в SUP2 (ADR D18).
  imagor:
    image: shumc/imagor:latest
    container_name: remlab-imagor
    restart: unless-stopped
    environment:
      - PORT=8000
      - IMAGOR_UNSAFE=1
      - FILE_LOADER_BASE_DIR=/mnt/data
    volumes:
      - remlab-traces:/mnt/data:ro
    networks: [remlab-net]
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db:
    image: pgvector/pgvector:pg17
    container_name: remlab-db
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=50"]
    environment:
      - POSTGRES_USER=remlab
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=remlab
    volumes:
      - remlab-db:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks: [remlab-net]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remlab -d remlab"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  remlab-net:
    external: true

volumes:
  remlab-db:
  remlab-traces:
  caddy-data:
  caddy-config:
